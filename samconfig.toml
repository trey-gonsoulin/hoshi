# SAM CLI configuration — committed so deploys are reproducible.
# Run `sam deploy --guided` once to populate image_repositories and
# any other values you want to pin, then commit the updated file.

version = 0.1

[default.global.parameters]
stack_name = "hoshi-api"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
# Set by `sam deploy --guided` after ECR repo is created:
# image_repositories = ["HoshiApiFunction=<account-id>.dkr.ecr.<region>.amazonaws.com/hoshi-api"]
