[project]
name = "hoshi-api"
version = "1.4.0"
description = "REST API for hoshi astrological charting."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "hoshi",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "mangum>=0.21.0",
    "mcp>=1.0",
]

[project.scripts]
hoshi-api = "hoshi_api.main:cli"

[tool.uv.sources]
hoshi = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.1.1",
]

[tool.hatch.build.targets.wheel]
packages = ["hoshi_api"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.semantic_release]
commit_parser = "conventional-monorepo"
version_toml = ["pyproject.toml:project.version"]
branch = "main"
commit_message = "chore(release): hoshi-api@{version}"
tag_format = "hoshi-api-v{version}"

[tool.semantic_release.commit_parser_options]
path_filters = ["."]
scope_prefix = "hoshi-api-"

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"

[tool.semantic_release.remote]
type = "github"
token = { env = "GH_TOKEN" }
