[project]
name = "hoshi-api"
version = "0.1.0"
description = "REST API for hoshi astrological charting."
requires-python = ">=3.11"
dependencies = [
    "hoshi",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
]

[project.scripts]
hoshi-api = "hoshi_api.main:cli"

[tool.uv.sources]
hoshi = { workspace = true }

[[tool.uv.index]]
url = "https://artifacts.apple.com/api/pypi/pypi-private/simple"
default = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.1.1",
]

[tool.hatch.build.targets.wheel]
packages = ["hoshi_api"]

[tool.pytest.ini_options]
testpaths = ["tests"]
