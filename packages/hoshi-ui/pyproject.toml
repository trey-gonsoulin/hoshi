[project]
name = "hoshi-ui"
version = "1.4.0"
description = "Textual TUI for hoshi astrological charting."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "hoshi",
    "textual>=1.0",
]

[project.scripts]
hoshi-ui = "hoshi_ui.main:cli"

[tool.uv.sources]
hoshi = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "pytest-asyncio>=0.24",
    "textual-dev>=1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["hoshi_ui"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.semantic_release]
commit_parser = "conventional-monorepo"
version_toml = ["pyproject.toml:project.version"]
branch = "main"
commit_message = "chore(release): hoshi-ui@{version}"
tag_format = "hoshi-ui-v{version}"

[tool.semantic_release.commit_parser_options]
path_filters = ["."]
scope_prefix = "hoshi-ui-"

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"

[tool.semantic_release.remote]
type = "github"
token = { env = "GH_TOKEN" }
