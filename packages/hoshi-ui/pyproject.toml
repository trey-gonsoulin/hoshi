[project]
name = "hoshi-ui"
version = "0.1.0"
description = "Textual TUI for hoshi astrological charting."
requires-python = ">=3.11"
dependencies = [
    "hoshi",
    "textual>=1.0",
]

[project.scripts]
hoshi-ui = "hoshi_ui.main:cli"

[tool.uv.sources]
hoshi = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "pytest-asyncio>=0.24",
    "textual-dev>=1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["hoshi_ui"]

[tool.pytest.ini_options]
testpaths = ["tests"]
