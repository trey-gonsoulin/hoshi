[project]
name = "hoshi"
version = "0.1.0"
description = "Real-sky astrology birth chart CLI."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.13.4",
    "rich>=15.0.0",
    "skyfield>=1.54",
    "typer>=0.26.7",
]

[project.scripts]
hoshi = "hoshi.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.hatch.build.targets.wheel]
packages = ["hoshi"]
