[project]
name = "hoshi"
version = "0.1.0"
description = "Real-sky astrology birth chart CLI."
readme = "README.md"
requires-python = ">=3.11"
classifiers = [
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = [
    "geopy>=2.4.1",
    "pydantic>=2.13.4",
    "pyyaml>=6.0.3",
    "rich>=15.0.0",
    "skyfield>=1.54",
    "typer>=0.26.7",
]

[project.scripts]
hoshi = "hoshi.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[[tool.uv.index]]
url = "https://artifacts.apple.com/api/pypi/pypi-private/simple"
default = true

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["hoshi"]

[dependency-groups]
dev = [
    "pytest>=9.1.1",
]
